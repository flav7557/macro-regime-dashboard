name: Update Macro Regime Dashboard

on:
  schedule:
    # 06:30 UTC, Monday-Friday (after US close, before EU open). Adjust as needed.
    - cron: "30 6 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write   # to commit the updated regime_history.csv
  pages: write      # to deploy to GitHub Pages
  id-token: write   # required by deploy-pages

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard
        run: python run.py

      - name: Verify output exists
        run: test -f output/index.html

      - name: Commit updated regime history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/regime_history.csv
          if git diff --staged --quiet; then
            echo "No history change to commit."
          else
            git commit -m "chore: update regime history [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
